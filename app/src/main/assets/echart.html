<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <style>
      html,
      body,
      #c {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }
    </style>
    <script src="echarts.min.js"></script>
  </head>
  <body>
    <div id="c"></div>
    <script>
      var chart = echarts.init(document.getElementById('c'), null, { renderer: 'canvas' })
      var pendente = null
      function render(json) {
        try {
          pendente = JSON.parse(json)
          chart.setOption(pendente, true)
        } catch (e) {}
      }
      window.addEventListener('resize', function () {
        chart.resize()
        if (pendente) chart.setOption(pendente, true)
      })
    </script>
  </body>
</html>
